services:  
  db_main:
    image: postgres:16
    container_name: network_monitor_db_main
    environment:
      POSTGRES_DB: ${DB_MAIN}
      POSTGRES_USER: ${DB_MAIN_USER}
      POSTGRES_PASSWORD: ${DB_MAIN_PASSWORD}
    volumes:
      - ./networkMonitor_dbMain:/var/lib/postgresql/data
    restart: unless-stopped
    ports: 
      - "5433:5432"
    networks:
      - networkMonitor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_MAIN_USER} -d ${DB_MAIN}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_system_usage:
    image: postgres:16
    container_name: network_monitor_db_system_usage
    environment:
      POSTGRES_DB: ${DB_SYS_USAGE}
      POSTGRES_USER: ${DB_SYS_USAGE_USER}
      POSTGRES_PASSWORD: ${DB_SYS_USAGE_PASSWORD}
    volumes:
      - ./networkMonitor_dbSystemUsage:/var/lib/postgresql/data
    restart: unless-stopped
    ports: 
      - "5434:5432"
    networks:
      - networkMonitor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_SYS_USAGE_USER} -d ${DB_SYS_USAGE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  network_monitor_api:
    build:
      context: ./Network_Monitor_API
      dockerfile: Dockerfile
    container_name: network_monitor_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_MAIN_CONNECTION_STRING: ${DB_MAIN_CONNECTION_STRING}
      DB_SYS_USAGE_CONNECTION_STRING: ${DB_SYS_USAGE_CONNECTION_STRING}
      InternalApi__ApiKey: ${INTERNAL_API_KEY}
      Jwt__Secret: ${JWT_SECRET}
      PythonService__BaseUrl: ${PYTHON_SERVICE_URL}
      DefaultAdmin__Login: ${DEFAULT_ADMIN_LOGIN}
      DefaultAdmin__Password: ${DEFAULT_ADMIN_PASS}
    ports:
      - "8080:8080"
    depends_on:
      db_main:
        condition: service_healthy
      db_system_usage:
        condition: service_healthy
    networks:
      - networkMonitor-network
    # network_monitor_python_service runs with network_mode: host (needed for
    # packet capture), so it's not reachable by container name. This makes
    # host.docker.internal resolve on native Linux Docker too (Docker Desktop
    # already provides it).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  network_monitor_python_service:
    build:
      context: ./Network_Monitor_NN_Model
      dockerfile: Dockerfile
    container_name: network_monitor_python
    environment:
      ASPNET_BASE_URL: http://localhost:8080
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      CAPTURE_INTERFACE: ${CAPTURE_INTERFACE}
      DATA_SOURCE: ${DATA_SOURCE}
      PYTHONUNBUFFERED: "1"
      DEFAULT_USER_ID: ${DEFAULT_USER_ID}
      THRESHOLD_OVERRIDE: ${THRESHOLD_OVERRIDE}
    volumes:
      - ./Network_Monitor_NN_Model/models:/app/models
    depends_on:
      - network_monitor_api
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

volumes:
  networkMonitor_dbMain:
  networkMonitor_dbSystemUsage:
networks:
  networkMonitor-network:
    driver: bridge
